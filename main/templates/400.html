{% extends 'main/base.html' %}
{% load static %}

{% block title %}400 - Bad Request | Watch2D{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-16">
  <div class="max-w-2xl w-full text-center">
    
    <div class="mb-8">
      <svg class="w-64 h-64 mx-auto text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>

    <h1 class="text-6xl lg:text-8xl font-black text-gray-900 dark:text-white mb-4">400</h1>
    <h2 class="text-2xl lg:text-3xl font-bold text-gray-800 dark:text-gray-200 mb-4">Bad Request</h2>
    <p class="text-lg text-gray-600 dark:text-gray-400 mb-8 max-w-lg mx-auto">
      Hmm, something about your request didn't quite work out. Let's try a different approach! 🤔
    </p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center mb-8">
      <a href="{% url 'main:home' %}" class="inline-flex items-center justify-center px-8 py-4 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold rounded-xl hover:scale-105 transition-all shadow-lg">
        <i class="fas fa-home mr-2"></i>Back to Home
      </a>
      <button onclick="history.back()" class="inline-flex items-center justify-center px-8 py-4 bg-white dark:bg-gray-800 text-gray-900 dark:text-white font-bold rounded-xl hover:scale-105 transition-all shadow-lg border-2">
        <i class="fas fa-arrow-left mr-2"></i>Go Back
      </button>
    </div>

  </div>
</div>
{% endblock %}
