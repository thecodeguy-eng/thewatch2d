<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Ibez</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            overflow: hidden;
        }
        
        .offline-container {
            max-width: 500px;
            padding: 40px 20px;
            animation: fadeIn 1s ease-out;
        }
        
        .offline-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            animation: bounce 2s ease-in-out infinite;
        }
        
        .offline-icon svg {
            width: 60px;
            height: 60px;
            fill: currentColor;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .offline-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        
        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .network-status {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .status-offline {
            background: #ef4444;
        }
        
        .status-online {
            background: #10b981;
        }
        
        .cached-pages {
            margin-top: 30px;
            text-align: left;
        }
        
        .cached-pages h3 {
            margin-bottom: 16px;
            font-size: 1.2rem;
        }
        
        .cached-pages ul {
            list-style: none;
            padding: 0;
        }
        
        .cached-pages li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .cached-pages li:last-child {
            border-bottom: none;
        }
        
        .cached-pages a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        
        .cached-pages a:hover {
            opacity: 1;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        @media (max-width: 480px) {
            .offline-container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .offline-actions {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 280px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <svg viewBox="0 0 24 24">
                <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.07 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
            </svg>
        </div>
        
        <h1>You're Offline</h1>
        <p>No internet connection detected. You can still browse previously viewed content or try reconnecting.</p>
        
        <div class="network-status">
            <span class="status-indicator status-offline" id="status-indicator"></span>
            <span id="status-text">Offline</span>
        </div>
        
        <div class="offline-actions">
            <button class="btn btn-primary" onclick="checkConnection()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
                Try Again
            </button>
            <a href="/" class="btn btn-secondary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                Go Home
            </a>
        </div>
        
        <div class="cached-pages">
            <h3>Available Offline:</h3>
            <ul id="cached-pages-list">
                <li><a href="/">🏠 Home Page</a></li>
                <li><a href="/movies/hollywood/">🎬 Hollywood Movies</a></li>
                <li><a href="/movies/nollywood/">🎭 Nollywood Movies</a></li>
                <li><a href="/movies/anime/">⭐ Anime Series</a></li>
            </ul>
        </div>
    </div>

    <script>
        // Network status monitoring
        function updateNetworkStatus() {
            const indicator = document.getElementById('status-indicator');
            const statusText = document.getElementById('status-text');
            
            if (navigator.onLine) {
                indicator.className = 'status-indicator status-online';
                statusText.textContent = 'Back Online!';
                
                // Auto-redirect when back online
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            } else {
                indicator.className = 'status-indicator status-offline';
                statusText.textContent = 'Offline';
            }
        }
        
        // Check connection manually
        function checkConnection() {
            if (navigator.onLine) {
                window.location.href = '/';
            } else {
                // Try to fetch a small resource to verify connection
                fetch('/', { mode: 'no-cors' })
                    .then(() => {
                        window.location.href = '/';
                    })
                    .catch(() => {
                        alert('Still offline. Please check your internet connection.');
                    });
            }
        }
        
        // Listen for network status changes
        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        
        // Initial status check
        updateNetworkStatus();
        
        // Load cached pages from service worker if available
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.ready.then(registration => {
                // You could implement cache inspection here
                console.log('Service worker ready for cache inspection');
            });
        }
        
        // Prevent form submissions when offline
        document.addEventListener('submit', function(event) {
            if (!navigator.onLine) {
                event.preventDefault();
                alert('Cannot submit forms while offline. Please try again when connected.');
            }
        });
    </script>
</body>
</html>
